name: Self-test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        id: scan
        with:
          domain: cloudflare.com
          minimum-grade: D
      - run: |
          echo "Score: ${{ steps.scan.outputs.score }}"
          echo "Grade: ${{ steps.scan.outputs.grade }}"
          echo "Passed: ${{ steps.scan.outputs.passed }}"
